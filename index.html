<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onside Live - Myanmar Football Live Stream & Scores</title>
    <script>
      (function() {
        var suppressMsg = function(msg) {
          if (!msg) return false;
          var m = String(msg).toLowerCase();
          return m.indexOf('script error') !== -1 || 
                 m.indexOf('resizeobserver') !== -1 ||
                 m.indexOf('cross-origin') !== -1 ||
                 m.indexOf('same-origin') !== -1 ||
                 m.indexOf('securityerror') !== -1;
        };

        // Standard window.onerror suppresses browser/iframe errors when returning true
        var oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          if (suppressMsg(message)) {
            return true; // suppresses reporting to browser console/host environment
          }
          if (oldOnError) {
            return oldOnError.apply(this, arguments);
          }
          return false;
        };

        window.addEventListener('error', function(event) {
          var msg = event.message || (event.error && event.error.message);
          if (suppressMsg(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var msg = event.reason && (event.reason.message || event.reason);
          if (suppressMsg(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var firstArg = args[0];
          if (suppressMsg(firstArg)) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
